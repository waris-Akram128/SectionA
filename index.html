<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Portal - Modern Learning Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --primary-light: #8b9eea;
            --secondary: #f093fb;
            --success: #48dbfb;
            --warning: #ffa502;
            --danger: #ff6b6b;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --text-lighter: #a0aec0;
            --border: #e2e8f0;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-light);
        }

        /* ===== LOGIN SCREEN ===== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            animation: float 6s ease-in-out infinite;
        }

        .login-container::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -50px;
            left: -50px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s ease;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            transition: var(--transition);
            background: var(--card-bg);
            color: var(--text);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-lighter);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: var(--transition);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary), #f073f0);
        }

        .btn-secondary:hover {
            box-shadow: 0 8px 20px rgba(240, 147, 251, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #00d2fc);
        }

        .btn-small {
            width: auto;
            padding: 10px 18px;
            font-size: 14px;
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease;
            font-weight: 500;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.error {
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .alert.success {
            background: rgba(72, 219, 251, 0.1);
            color: var(--success);
            border: 1px solid rgba(72, 219, 251, 0.2);
        }

        .demo-info {
            margin-top: 32px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(240, 147, 251, 0.05));
            border: 1px solid rgba(102, 126, 234, 0.1);
            border-radius: 12px;
            font-size: 13px;
            color: var(--text);
            line-height: 1.8;
        }

        .demo-info strong {
            color: var(--primary);
            display: block;
            margin-top: 8px;
        }

        .demo-info code {
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: var(--danger);
        }

        /* ===== MAIN APP LAYOUT ===== */
        .app-container {
            display: none;
            min-height: 100vh;
        }

        .app-container.active {
            display: flex;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--card-bg);
            box-shadow: var(--shadow-md);
            padding: 24px 16px;
            overflow-y: auto;
            z-index: 100;
            transition: var(--transition);
            border-right: 1px solid var(--border);
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 50;
        }

        .sidebar-overlay.active {
            display: block;
        }

        .sidebar-header {
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 24px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        .user-info h2 {
            font-size: 1.2rem;
            margin-bottom: 4px;
            color: var(--text);
        }

        .user-role {
            display: inline-block;
            background: linear-gradient(135deg, var(--danger), #f56565);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 8px;
        }

        .user-role.student {
            background: linear-gradient(135deg, var(--success), #00d2fc);
        }

        .nav-menu {
            list-style: none;
            margin-bottom: 24px;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            position: relative;
        }

        .nav-link:hover {
            background: var(--bg);
            color: var(--primary);
            padding-left: 20px;
        }

        .nav-link.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(240, 147, 251, 0.1));
            color: var(--primary);
            border-left: 4px solid var(--primary);
            padding-left: 12px;
        }

        .nav-link i {
            font-size: 18px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 24px;
            border-top: 2px solid var(--border);
        }

        .sidebar-footer .btn {
            margin-bottom: 12px;
        }

        .sidebar-footer p {
            font-size: 11px;
            color: var(--text-lighter);
            text-align: center;
            margin-top: 12px;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-left: 280px;
            padding: 30px;
            min-height: 100vh;
            transition: var(--transition);
            flex: 1;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        .header-bar .toggle-sidebar {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
        }

        @media (max-width: 768px) {
            .header-bar .toggle-sidebar {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 2.5rem;
            color: var(--text);
            margin-bottom: 8px;
            font-weight: 800;
        }

        .page-header p {
            color: var(--text-light);
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 1.8rem;
            }
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            transition: var(--transition);
            border: 1px solid var(--border);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
        }

        /* ===== STATS GRID ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(240, 147, 251, 0.1));
            padding: 28px;
            border-radius: 16px;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid rgba(102, 126, 234, 0.2);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            opacity: 0;
            transition: var(--transition);
            z-index: 0;
        }

        .stat-card:hover::before {
            opacity: 0.1;
            top: -25%;
            right: -25%;
        }

        .stat-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }

        .stat-number {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
        }

        .stat-label {
            font-size: 0.95rem;
            color: var(--text-light);
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        /* ===== CONTENT GRID ===== */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        /* ===== ANNOUNCEMENT ITEM ===== */
        .announcement-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            display: flex;
            gap: 16px;
        }

        .announcement-item:hover {
            transform: translateX(8px);
            box-shadow: var(--shadow-md);
        }

        .announcement-item.urgent {
            border-left-color: var(--danger);
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.05), white);
        }

        .announcement-icon {
            font-size: 2rem;
            flex-shrink: 0;
        }

        .announcement-content {
            flex: 1;
        }

        .announcement-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .announcement-meta {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .urgent-badge {
            background: linear-gradient(135deg, var(--danger), #f56565);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        /* ===== FORMS ===== */
        .form-section {
            background: var(--card-bg);
            padding: 28px;
            border-radius: 16px;
            margin-bottom: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .form-section h3 {
            margin-bottom: 24px;
            color: var(--text);
            font-size: 1.2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: var(--transition);
            background: var(--card-bg);
            color: var(--text);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            padding: 12px;
            background: var(--bg);
            border-radius: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 2px solid var(--border);
            overflow-x: auto;
            padding-bottom: 16px;
        }

        .tabs::-webkit-scrollbar {
            height: 4px;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: var(--transition);
            white-space: nowrap;
            font-weight: 600;
            color: var(--text-light);
            background: none;
            border: none;
        }

        .tab:hover {
            color: var(--primary);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* ===== ASSIGNMENT CARD ===== */
        .assignment-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            transition: var(--transition);
        }

        .assignment-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .assignment-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .assignment-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .assignment-meta {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            color: var(--text-light);
        }

        .days-left {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .days-left.urgent {
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .days-left.good {
            background: rgba(72, 219, 251, 0.1);
            color: var(--success);
            border: 1px solid rgba(72, 219, 251, 0.2);
        }

        /* ===== BUTTON GROUP ===== */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 16px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-light);
            transition: var(--transition);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: var(--text);
            transform: rotate(90deg);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* ===== LOADING SPINNER ===== */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .btn.loading .spinner {
            display: block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        /* ===== TOAST NOTIFICATIONS ===== */
        .toast {

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const SUPABASE_URL = 'https://eveaqmdmcubbptahxmdv.supabase.co';
        const SUPABASE_KEY = 'sb_secret_XBGdpHzCvJDRKTsI5WDeZQ_K_4q1DuQ';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        let currentUser = null;

        // ==========================================

        // ==========================================

        // ==========================================
        async function handleLogin(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            btn.classList.add('loading');

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    showAlert('Invalid username or password', 'error');
                    return;
                }

                currentUser = data;
                state.isTeacher = data.role === 'teacher';
                showApp();
                showAlert(`Welcome back, ${data.full_name || username}!`, 'success');

            } catch (err) {
                showAlert('Connection error. Please try again.', 'error');
                console.error(err);
            } finally {
                btn.classList.remove('loading');
            }
        }

        function showAlert(message, type) {
            const alert = document.getElementById('loginAlert');
            const icon = document.getElementById('alertIcon');
            const msg = document.getElementById('alertMessage');

            alert.className = `alert ${type}`;
            icon.textContent = type === 'error' ? '❌' : '✅';
            msg.textContent = message;

            if (type === 'success') {
                setTimeout(() => {
                    alert.style.display = 'none';
                }, 3000);
            }
        }

        function showApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');

            document.getElementById('userName').textContent = currentUser.full_name || currentUser.username;

            const roleDiv = document.getElementById('userRole');
            const avatar = document.getElementById('userAvatar');

            if (state.isTeacher) {
                roleDiv.innerHTML = '<span class="user-role">👨‍🏫 TEACHER</span>';
                avatar.textContent = '👨‍🏫';
            } else {
                roleDiv.innerHTML = '<span class="user-role student">📚 STUDENT</span>';
                avatar.textContent = '📚';
            }

            renderNavigation();
            navigateTo('home');
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                currentUser = null;
                document.getElementById('appContainer').classList.remove('active');
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('loginForm').reset();
                closeSidebar();
            }
        }

        // ==========================================
        // SIDEBAR MANAGEMENT
        // ==========================================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            state.sidebarOpen = !state.sidebarOpen;

            if (state.sidebarOpen) {
                sidebar.classList.add('open');
                overlay.classList.add('active');
            } else {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            }
        }

        function closeSidebar() {
            state.sidebarOpen = false;
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }

        // ==========================================
        // NAVIGATION
        // ==========================================
        function renderNavigation() {
            const nav = document.getElementById('navMenu');

            const items = [
                { id: 'home', icon: 'fas fa-home', label: 'Home' },
                { id: 'teacher', icon: 'fas fa-chalkboard-user', label: 'About Teacher' },
                { id: 'schedule', icon: 'fas fa-calendar', label: 'Schedule' },
                { id: 'assignments', icon: 'fas fa-book', label: 'Assignments' },
                { id: 'resources', icon: 'fas fa-lightbulb', label: 'Resources' },
                { id: 'announcements', icon: 'fas fa-bell', label: 'Announcements' },
                { id: 'parent', icon: 'fas fa-users', label: 'Parent Corner' },
                { id: 'student', icon: 'fas fa-handshake', label: 'Student Hub' }
            ];

            if (state.isTeacher) {
                items.unshift({ id: 'dashboard', icon: 'fas fa-sliders', label: 'Dashboard' });
            }

            nav.innerHTML = items.map(item => `
                <li class="nav-item">
                    <div class="nav-link ${currentPage === item.id ? 'active' : ''}"

                        <i class="${item.icon}"></i>
                        <span>${item.label}</span>
                    </div>
                </li>
            `).join('');
        }

        function navigateTo(page) {
            currentPage = page;
            closeSidebar();

            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.toggle('active', link.dataset.page === page);

            const content = document.getElementById('mainContent');
            content.innerHTML = getPageContent(page);

            if (page === 'dashboard') initDashboard();
            else if (page === 'home') initHome();
            else if (page === 'announcements') initAnnouncements();
            else if (page === 'assignments') initAssignments();
            else if (page === 'schedule') initSchedule();
            else if (page === 'resources') initResources();
        }

                </div>

        function getProfileForm() {

                <div class="form-section">

                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" placeholder="Your phone">

                                <label>Office Hours</label>

        // ==========================================
        // DATA FETCHING
        // ==========================================
        async function fetchData(table, options = {}) {
            try {
                let query = supabase.from(table).select(options.select || '*');

                if (options.order) {
                    query = query.order(options.order.column, { ascending: options.order.ascending });
                }

                if (options.limit) {
                    query = query.limit(options.limit);
                }

                const { data, error } = await query;
                if (error) throw error;
                return data || [];
            } catch (err) {
                console.error(`Error fetching ${table}:`, err);
                return [];
            }
        }

        // ==========================================
        // PAGE INITIALIZERS
        // ==========================================
        async function initHome() {
            const announcements = await fetchData('announcements', {
                order: { column: 'created_at', ascending: false },
                limit: 3
            });
            const assignments = await fetchData('assignments', {
                order: { column: 'due_date', ascending: true }
            });
            const schedule = await fetchData('class_schedule', {
                order: { column: 'date', ascending: true }
            });

            document.getElementById('statAnnouncements').textContent = announcements.length;

            const activeAssignments = assignments.filter(a => new Date(a.due_date) >= new Date());
            document.getElementById('statAssignments').textContent = activeAssignments.length;

            const weekEvents = schedule.filter(s => {
                const d = new Date(s.date);
                const week = new Date();
                week.setDate(week.getDate() + 7);
                return d >= new Date() && d <= week;
            });
            document.getElementById('statEvents').textContent = weekEvents.length;

            const annContainer = document.getElementById('homeAnnouncements');
            if (announcements.length === 0) {
                annContainer.innerHTML = '<div class="empty-state"><p>No announcements yet</p></div>';
            } else {
                annContainer.innerHTML = announcements.map(item => `
                    <div class="announcement-item ${item.is_urgent ? 'urgent' : ''}">
                        <div class="announcement-icon">${item.is_urgent ? '🚨' : '📌'}</div>
                        <div class="announcement-content">
                            <div class="announcement-title">${item.title}</div>
                            <p style="margin: 8px 0; color: var(--text-light);">${item.content.substring(0, 120)}...</p>
                            <div class="announcement-meta">
                                📅 ${new Date(item.created_at).toLocaleDateString()} | 📂 ${item.category}
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function initAnnouncements() {
            const announcements = await fetchData('announcements', {
                order: { column: 'created_at', ascending: false }
            });

            const container = document.getElementById('announcementsList');
            if (announcements.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No announcements</p></div>';
            } else {
                container.innerHTML = announcements.map(item => `
                    <div class="announcement-item ${item.is_urgent ? 'urgent' : ''}">
                        <div class="announcement-icon">${item.is_urgent ? '🚨' : '📌'}</div>
                        <div class="announcement-content">
                            <div class="announcement-title">${item.title}</div>
                            <p style="margin: 12px 0; line-height: 1.6;">${item.content}</p>
                            <div class="announcement-meta">
                                📅 ${new Date(item.created_at).toLocaleString()} | 📂 ${item.category}
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function initAssignments() {
            const assignments = await fetchData('assignments', {
                order: { column: 'due_date', ascending: true }
            });

            const current = assignments.filter(a => new Date(a.due_date) >= new Date());
            const past = assignments.filter(a => new Date(a.due_date) < new Date());

            renderAssignmentList('assignmentsCurrent', current);
            renderAssignmentList('assignmentsPast', past);
        }

        function renderAssignmentList(elementId, assignments) {
            const container = document.getElementById(elementId);
            if (assignments.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📚</div><p>No assignments</p></div>';
                return;
            }

            container.innerHTML = assignments.map(item => {
                const days = Math.ceil((new Date(item.due_date) - new Date()) / (1000 * 60 * 60 * 24));
                const daysClass = days <= 3 ? 'urgent' : 'good';
                const daysText = days === 0 ? 'Due Today' : days === 1 ? '1 day left' : `${days} days left`;

                return `
                    <div class="assignment-card">
                        <div class="assignment-header">
                            <div>
                                <div class="assignment-title">${item.title}</div>
                                <p style="margin-top: 8px; color: var(--text-light);">${item.description || 'No description'}</p>
                            </div>
                            ${days >= 0 ? `<span class="days-left ${daysClass}">${daysText}</span>` : ''}
                        </div>
                        <div class="assignment-meta">
                            <span class="meta-item">📅 ${item.due_date}</span>
                            <span class="meta-item">🏆 ${item.points} points</span>
                            ${item.file_url ? `<a href="${item.file_url}" target="_blank" class="btn btn-small">📥 Download</a>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function switchAssignTab(tab) {
            document.querySelectorAll('#assignmentsCurrent, #assignmentsPast').forEach(el => el.classList.remove('active'));
            document.getElementById(tab === 'current' ? 'assignmentsCurrent' : 'assignmentsPast').classList.add('active');

            document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function initSchedule() {
            const schedule = await fetchData('class_schedule', {
                order: { column: 'date', ascending: true }
            });

            const container = document.getElementById('scheduleList');
            if (schedule.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📅</div><p>No events</p></div>';
            } else {
                container.innerHTML = schedule.map(item => {
                    const icon = item.is_holiday ? '🏖️' : item.is_important ? '🔴' : '📅';
                    return `
                        <div class="card">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;">
                                <div>
                                    <h3 style="margin-bottom: 8px;">${icon} ${item.event}</h3>
                                    <p style="color: var(--text-light);">${item.description || ''}</p>
                                </div>
                                <div style="text-align: right; white-space: nowrap;">
                                    <div style="font-weight: bold; color: var(--primary);">${item.date}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        async function initResources() {
            const resources = await fetchData('resources', {
                order: { column: 'category', ascending: true }
            });

            const container = document.getElementById('resourcesList');
            if (resources.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🧠</div><p>No resources yet</p></div>';
            } else {
                const byCategory = resources.reduce((acc, item) => {
                    acc[item.category] = acc[item.category] || [];
                    acc[item.category].push(item);
                    return acc;
                }, {});

                container.innerHTML = Object.entries(byCategory).map(([cat, items]) => `
                    <div class="card">
                        <h3 class="card-title">📂 ${cat}</h3>
                        ${items.map(item => `
                            <div style="padding: 16px 0; border-bottom: 1px solid var(--border);">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;">
                                    <div>
                                        <strong>${item.title}</strong>
                                        <p style="color: var(--text-light); font-size: 14px; margin-top: 4px;">${item.description || ''}</p>
                                    </div>
                                    ${item.url ? `<a href="${item.url}" target="_blank" class="btn btn-small">🔗 Open</a>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `).join('');
            }
        }

        // ==========================================
        // TEACHER DASHBOARD
        // ==========================================
        async function initDashboard() {
            const users = await fetchData('users');
            const assignments = await fetchData('assignments');
            const submissions = await fetchData('assignment_submissions');
            const announcements = await fetchData('announcements');

            document.getElementById('dashStudents').textContent = users.filter(u => u.role === 'student').length;
            document.getElementById('dashAssignments').textContent = assignments.filter(a => new Date(a.due_date) >= new Date()).length;
            document.getElementById('dashPending').textContent = submissions.filter(s => s.status === 'submitted').length;
            document.getElementById('dashAnnouncements').textContent = announcements.length;

            loadTeacherAnnouncements();
            loadTeacherAssignments();
            loadTeacherSchedule();
            loadTeacherResources();
            loadGradingList();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadTeacherAnnouncements() {
            const announcements = await fetchData('announcements', {
                order: { column: 'created_at', ascending: false }
            });

            const container = document.getElementById('teacherAnnouncementsList');
            if (announcements.length === 0) {
                container.innerHTML = '<p style="color: var(--text-light); text-align: center; padding: 40px;">No announcements yet</p>';
            } else {
                container.innerHTML = announcements.map(item => `
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: start; gap: 12px;">
                            <div>
                                <strong>${item.is_urgent ? '🚨 ' : ''}${item.title}</strong>
                                <div class="text-sm text-gray">${item.category} • ${new Date(item.created_at).toLocaleDateString()}</div>
                            </div>
                            <button class="btn btn-small btn-secondary" onclick="deleteItem('announcements', ${item.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function loadTeacherAssignments() {
            const assignments = await fetchData('assignments', {
                order: { column: 'due_date', ascending: false }
            });

            const container = document.getElementById('teacherAssignmentsList');
            if (assignments.length === 0) {
                container.innerHTML = '<p style="color: var(--text-light); text-align: center; padding: 40px;">No assignments yet</p>';
            } else {
                container.innerHTML = assignments.map(item => `
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
                            <div>
                                <strong>${item.title}</strong>
                                <div class="text-sm text-gray">Due: ${item.due_date} | Points: ${item.points}</div>
                            </div>
                            <button class="btn btn-small btn-secondary" onclick="deleteItem('assignments', ${item.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function loadTeacherSchedule() {
            const schedule = await fetchData('class_schedule', {
                order: { column: 'date', ascending: true }
            });

            const container = document.getElementById('teacherScheduleList');
            if (schedule.length === 0) {
                container.innerHTML = '<p style="color: var(--text-light); text-align: center; padding: 40px;">No events yet</p>';
            } else {
                container.innerHTML = schedule.map(item => `
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
                            <div>
                                <strong>${item.is_holiday ? '🏖️ ' : item.is_important ? '🔴 ' : '📅 '}${item.event}</strong>
                                <div class="text-sm text-gray">${item.date}</div>
                            </div>
                            <button class="btn btn-small btn-secondary" onclick="deleteItem('class_schedule', ${item.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function loadTeacherResources() {
            const resources = await fetchData('resources');

            const container = document.getElementById('teacherResourcesList');
            if (resources.length === 0) {
                container.innerHTML = '<p style="color: var(--text-light); text-align: center; padding: 40px;">No resources yet</p>';
            } else {
                container.innerHTML = resources.map(item => `
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
                            <div>
                                <strong>${item.title}</strong>
                                <div class="text-sm text-gray">${item.category}</div>
                            </div>
                            <button class="btn btn-small btn-secondary" onclick="deleteItem('resources', ${item.id})">Remove</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function loadGradingList() {
            const submissions = await fetchData('assignment_submissions', {
                select: '*, assignments(title)'
            });

            const pending = submissions.filter(s => s.status === 'submitted');
            const container = document.getElementById('gradingList');

            if (pending.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎉</div><p>All caught up!</p></div>';
            } else {
                container.innerHTML = pending.map(sub => `
                    <div class="card">
                        <div style="margin-bottom: 16px;">
                            <strong>${sub.student_name}</strong>
                            <div class="text-sm text-gray">${sub.assignments?.title} • ${new Date(sub.submitted_at).toLocaleDateString()}</div>
                        </div>
                        <form onsubmit="submitGrade(event, ${sub.id})">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Grade (0-100)</label>
                                    <input type="number" min="0" max="100" required>
                                </div>
                                <div class="form-group">
                                    <label>Feedback</label>
                                    <input type="text" placeholder="Optional feedback...">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success btn-small">✅ Submit Grade</button>
                        </form>
                    </div>
                `).join('');
            }
        }

        // ==========================================
        // SUBMIT HANDLERS
        // ==========================================
        async function submitAnnouncement(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);

            const data = {
                title: form.querySelector('input').value,
                content: form.querySelector('textarea').value,
                category: form.querySelector('select').value,
                is_urgent: form.querySelector('#annUrgent').checked,
                created_at: new Date().toISOString()
            };

            const { error } = await supabase.from('announcements').insert([data]);
            if (error) {
                showToast('Error creating announcement', 'error');
            } else {
                showToast('Announcement posted!', 'success');
                form.reset();
                loadTeacherAnnouncements();
            }
        }

        async function submitAssignment(event) {
            event.preventDefault();
            const form = event.target;
            const inputs = form.querySelectorAll('input, textarea');

            const data = {
                title: inputs[0].value,
                description: inputs[3].value,
                due_date: inputs[1].value,
                points: parseInt(inputs[2].value),
                file_url: inputs[4].value || null,
                created_at: new Date().toISOString()
            };

            const { error } = await supabase.from('assignments').insert([data]);
            if (error) {
                showToast('Error creating assignment', 'error');
            } else {
                showToast('Assignment created!', 'success');
                form.reset();
                loadTeacherAssignments();
            }
        }

        async function submitSchedule(event) {
            event.preventDefault();
            const form = event.target;
            const inputs = form.querySelectorAll('input, textarea');

            const data = {
                date: inputs[0].value,
                event: inputs[1].value,
                description: form.querySelector('textarea').value,
                is_important: form.querySelector('#schedImportant').checked,
                is_holiday: form.querySelector('#schedHoliday').checked
            };

            const { error } = await supabase.from('class_schedule').insert([data]);
            if (error) {
                showToast('Error adding event', 'error');
            } else {
                showToast('Event added!', 'success');
                form.reset();
                loadTeacherSchedule();
            }
        }

        async function submitResource(event) {
            event.preventDefault();
            const form = event.target;
            const inputs = form.querySelectorAll('input, select, textarea');

            const data = {
                title: inputs[0].value,
                description: inputs[2].value,
                category: inputs[1].value,
                url: inputs[3].value || null
            };

            const { error } = await supabase.from('resources').insert([data]);
            if (error) {
                showToast('Error adding resource', 'error');
            } else {
                showToast('Resource added!', 'success');
                form.reset();
                loadTeacherResources();
            }
        }

        async function submitProfile(event) {
            event.preventDefault();
            const form = event.target;
            const inputs = form.querySelectorAll('input, textarea');

            const data = {
                name: inputs[0].value,
                email: inputs[1].value,
                phone: inputs[2].value,
                office_hours: inputs[3].value,
                bio: form.querySelector('textarea').value,
                updated_at: new Date().toISOString()
            };

            const { error } = await supabase.from('teacher_profile').update(data).eq('id', 1);
            if (error) {
                showToast('Error updating profile', 'error');
            } else {
                showToast('Profile updated!', 'success');
            }
        }

        async function submitGrade(event, submissionId) {
            event.preventDefault();
            const form = event.target;
            const inputs = form.querySelectorAll('input');

            const { error } = await supabase.from('assignment_submissions')
                .update({
                    grade: inputs[0].value,
                    feedback: inputs[1].value,
                    status: 'graded'
                })
                .eq('id', submissionId);

            if (error) {
                showToast('Error submitting grade', 'error');
            } else {
                showToast('Grade submitted!', 'success');
                loadGradingList();
            }
        }

        async function deleteItem(table, id) {
            if (!confirm('Delete this item?')) return;

            const { error } = await supabase.from(table).delete().eq('id', id);
            if (error) {
                showToast('Error deleting', 'error');
            } else {
                showToast('Item deleted!', 'success');

                if (table === 'announcements') loadTeacherAnnouncements();
                else if (table === 'assignments') loadTeacherAssignments();
                else if (table === 'class_schedule') loadTeacherSchedule();
                else if (table === 'resources') loadTeacherResources();
            }
        }

        // ==========================================
        // UTILITIES
        // ==========================================
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = (type === 'success' ? '✅ ' : '❌ ') + message;
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), 3000);
        }

        function openModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
    </script>
</body>
